<section id="portfolio-project{{index}}" [ngClass]="index % 2 != 0 ? 'reverse-item' : ''"
    *transloco="let t; read:'portfolioItem'">
    <div class="left-section" data-aos="flip-right" data-aos-anchor-placement="top-bottom" data-aos-duration="1500">
        <img [src]="project.imgPath" alt="">
    </div>
    <div class="right-section" data-aos="flip-left" data-aos-anchor-placement="top-bottom" data-aos-duration="1500"
        [ngClass]="index % 2 != 0 ? 'reverse-right-section' : ''">
        <h3>{{project.title}}</h3>
        <p class="technologys">
            @for (technology of project.technologys; track technology; let last = $last) {
            {{ technology }}@if (!last) { | }
            }
        </p>
        <p class="description">{{t('description' + index)}}</p>
        <div [ngClass]="project.api_link ? 'lg-btn-con-w' : ''" class="buttons-container">
            <a href="{{project.links[0]}}" target="_blank" rel="noopener noreferrer" class="life-test-btn">Life test</a>
            <a href="{{project.links[1]}}" target="_blank" rel="noopener noreferrer" class="github-btn">Github</a>
            @if (project.api_link) {
            <a href="{{project.api_link}}" target="_blank" rel="noopener noreferrer" class="api-btn">Github Api</a>
            }
        </div>
    </div>
</section>
